<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Pulse</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="overlay" id="overlay"></div>


<header>
    <h1>NEXUS PULSE</h1>

    <!-- Botão Hambúrguer (Aparece só no mobile) -->
    <div class="menu-toggle" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav id="mainNav">
        <h4>Streamers</h4>
        <h4>E-Sports</h4>
        <h4>Hall-Stars</h4>
    </nav>

    <div style="position: relative; display: inline-block;">
        <svg style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px;"
            viewBox="0 0 24 24">
            <path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"
                stroke="#888" stroke-width="2" fill="none" stroke-linecap="round" />
        </svg>

        <input type="text" placeholder="Pesquisar..."
            style="padding: 8px 8px 8px 36px;">
    </div>
</header>



<main class="grid-streamers">
    <!-- Card do Casimiro -->
    <div class="card" onclick="mostrarDados('Casimiro', 'O maior streamer do Brasil. Reage a tudo e transmite jogos ao vivo.' , 'Followers', '3.8M', '500K')">
        <div class="status-live">LIVE</div>
        <img src="img/streamer-casimiro - Copia.jpg" alt="Casimiro">
        <div class="card-info">
            <h3>Casimiro</h3>
            <p class="seguidor">3.8M Followers</p>
        </div>
    </div>

    <!-- Card do Neymar --> 
    <div class="card" onclick="mostrarDados('Neymar', 'Craque nos campos e nos games. Joga CS2 e interage com o chat.', 'Followers', '2.1M', '9K')">
        <div class="status-live">LIVE</div>
        <img src="img/streamer-neymar - Copia.jpg" alt="Neymar">
        <div class="card-info">
            <h3>Neymar Jr</h3>
            <p>2.1M Followers</p>
        </div>
    </div>

    <!-- Card do Ninja -->
    <div class="card" onclick="mostrarDados('Ninja', 'Lenda do Fortnite e um dos maiores streamers do mundo.', 'Followers', '18.5M', '5.6K')">
        <div class="status-live">LIVE</div>
        <img src="img/streamer-ninja - Copia.jpg" alt="Ninja">
        <div class="card-info">
            <h3>Ninja</h3>
            <p>18.5M Followers</p>
        </div>
    </div>

    <!-- O painel de dados lateral -->
    <div id="painel" class="painel-lateral">
        <div class="perfil-header">
            <div class="foto-perfil"></div>
            <h2 id="nome"></h2>
        </div>
        <div class="stats-grid">
            <div><strong id="followers"></strong><p id="followers_number"></p></div>
            <div><strong>Avg. Viewers</strong><p id="viewers"></p></div>
        </div>
        <p id="info"></p>
        <button class="btn-campaign">Select for Campaign</button>
    </div>
</main>


<article>
    <h4>JOGOS</h4>
    <img src="img/Tom_Clancys_Rainbow_Six_Siege_X2026-2-4-13-44-6.jpg" alt="League of Legends">
    <img src="img/Tom_Clancys_Rainbow_Six_Siege_X2026-2-4-13-44-6.jpg" alt="CS2">
    <img src="img/Tom_Clancys_Rainbow_Six_Siege_X2026-2-4-13-44-6.jpg" alt="Valorant">
</article>

<footer class="footer">
    <div class="footer-container">

        <div>
            <h2>Nexus Pulse</h2>
            <p>Conectando você ao futuro da tecnologia.</p>
        </div>

        <div>
            <p>© 2026 Nexus Pulse</p>
        </div>

        <div>
            <p>Dev's Curiosos</p>
        </div>

    </div>
</footer>

<script src="script.js"></script>

</body>
</html>
